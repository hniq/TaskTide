<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不咕了 - 让DDL成为第一生产力</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <span class="logo-icon">&#128640;</span>
    <span class="logo-text">不咕了</span>
    <span class="logo-tag">让DDL成为第一生产力</span>
  </div>
  <div class="ai-bar">
    <input class="ai-input" id="aiInput" placeholder="告诉我你的任务... (Ctrl+K)" autocomplete="off">
    <span class="ai-status" id="aiStatus"></span>
    <button class="ai-send" id="aiSendBtn">&#10148;</button>
    <div class="ai-preview" id="aiPreview"></div>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" id="settingsBtn">设置</button>
  </div>
</header>

<!-- App Shell -->
<div class="app">
  <!-- Left Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-toolbar">
      <button class="btn-new" id="newTaskBtn">+ 新建任务</button>
      <select class="sort-select" id="sortSelect" title="排序方式">
        <option value="deadline">按截止日期</option>
        <option value="priority">按优先级</option>
        <option value="manual">手动排序</option>
      </select>
      <button class="filter-btn" id="filterBtn">
        <span>筛选</span>
        <span id="filterText" style="font-size:10px;margin-left:4px">全部</span>
      </button>
    </div>
    <div class="sidebar-list" id="taskList"></div>
    <div class="sidebar-completed-section" id="sidebarCompletedSection">
      <button class="sidebar-completed-toggle" id="sidebarCompletedToggle">
        <span>已完成 (<span id="sidebarCompCount">0</span>)</span>
        <span class="arrow" id="sidebarCompArrow">&#9660;</span>
      </button>
      <div class="sidebar-completed-list" id="sidebarCompList"></div>
    </div>
    <div class="sidebar-stats" id="sidebarStats"></div>
  </aside>

  <!-- Center Main -->
  <div class="main">
    <div class="main-toolbar">
      <div class="main-nav">
        <button class="nav-btn" id="navPrev">&#9664;</button>
        <span class="nav-title" id="navTitle"></span>
        <button class="nav-btn" id="navNext">&#9654;</button>
        <button class="nav-btn" id="navToday">今天</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="view-toggle">
          <button class="vtog-btn active" data-view="month" id="viewMonth">月</button>
          <button class="vtog-btn" data-view="week" id="viewWeek">周</button>
        </div>
        <div class="main-actions">
          <button class="dbtn dbtn-primary" style="font-size:12px;padding:5px 12px" id="autoAssignBtn">自动分配</button>
        </div>
      </div>
    </div>
    <div class="main-body" id="mainBody"></div>
  </div>

  <!-- Right Panel -->
  <aside class="panel" id="panel">
    <div class="panel-section">
      <h3>四象限矩阵</h3>
      <div class="matrix-grid" id="matrixGrid"></div>
      <div class="matrix-axes"><span>&#8593; 重要</span><span>紧急 &#8594;</span></div>
    </div>
    <div class="panel-section">
      <h3>本周统计</h3>
      <div id="weekStats"></div>
    </div>
  </aside>
</div>

<!-- Detail Overlay (inline editing) -->
<div class="detail-mask" id="detailMask"></div>
<div class="detail-overlay" id="detailPanel">
  <div class="detail-header">
    <input type="text" class="detail-title-input" id="detailTitleInput" placeholder="任务标题">
    <button class="detail-close" id="detailClose">&#10005;</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- Task Modal -->
<div class="modal-bg" id="taskModal">
  <div class="modal">
    <div class="modal-head"><h3 id="taskModalTitle">新建任务</h3><button class="modal-x" id="taskModalClose">&#10005;</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="fg"><label>任务标题 *</label><input type="text" id="fTitle" placeholder="例如：完成课程论文" maxlength="100"></div>
      <div class="fg"><label>截止日期 *</label><input type="date" id="fDeadline"></div>
      <div class="form-row">
        <div class="fg">
          <label>重要程度</label>
          <div class="slider-wrap"><input type="range" class="importance-range" id="fImportance" min="1" max="5" value="3"><span class="slider-val" id="fImpVal">3</span></div>
        </div>
        <div class="fg">
          <label>紧急程度</label>
          <div class="slider-wrap"><input type="range" class="urgency-range" id="fUrgency" min="1" max="5" value="3"><span class="slider-val" id="fUrgVal">3</span></div>
        </div>
      </div>
      <div class="quadrant-preview" id="qPreview"></div>
      <div class="fg" style="margin-top:14px"><label>备注</label><textarea id="fNotes" placeholder="可选备注..."></textarea></div>
    </div>
    <div class="modal-foot"><button class="dbtn" id="taskModalCancel">取消</button><button class="dbtn dbtn-primary" id="taskModalSave">保存</button></div>
  </div>
</div>

<!-- Split Modal -->
<div class="modal-bg" id="splitModal">
  <div class="modal">
    <div class="modal-head"><h3>智能拆分</h3><button class="modal-x" id="splitModalClose">&#10005;</button></div>
    <div class="modal-body">
      <div class="fg"><label>总预估时长 (小时)</label><input type="number" id="splitTotalHours" min="0.5" step="0.5" value="8"></div>
      <p style="font-size:12px;color:var(--text-3);margin-bottom:10px">建议拆分为以下子任务（可自由编辑）：</p>
      <div id="splitItems"></div>
      <div class="split-total" id="splitTotal"></div>
      <button class="dbtn" style="margin-top:6px;font-size:11px" id="addSplitItemBtn">+ 添加子任务</button>
    </div>
    <div class="modal-foot"><button class="dbtn" id="splitModalSkip">取消</button><button class="dbtn dbtn-primary" id="splitModalApply">应用拆分</button></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-bg" id="settingsModal">
  <div class="modal" style="max-width:540px">
    <div class="modal-head"><h3>设置</h3><button class="modal-x" id="settingsModalClose">&#10005;</button></div>
    <div class="modal-body">
      <div class="settings-section">
        <h4>任务规划</h4>
        <div class="setting-row"><div class="setting-info"><div class="s-label">每日可用时长 (小时)</div></div><div class="setting-ctrl"><input type="number" id="sDailyH" min="1" max="16" step="0.5"></div></div>
        <div class="setting-row"><div class="setting-info"><div class="s-label">拆分阈值 (小时)</div><div class="s-desc">超过此时长自动建议拆分</div></div><div class="setting-ctrl"><input type="number" id="sSplitT" min="1" max="40"></div></div>
        <div class="setting-row"><div class="setting-info"><div class="s-label">拆分后自动分配</div></div><div class="setting-ctrl"><select id="sAutoAssign"><option value="true">开启</option><option value="false">关闭</option></select></div></div>
        <div class="setting-row setting-row-col">
          <div class="setting-info">
            <div class="s-label">每周可用时段</div>
            <div class="s-desc">自动分配仅使用这些时段；未设置时回退为每日可用时长</div>
          </div>
          <div class="setting-ctrl setting-ctrl-block">
            <div class="weekly-slots" id="sWeeklySlots"></div>
            <button class="dbtn" style="font-size:11px" id="sAddWeeklySlot">+ 添加时段</button>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <h4>数据管理</h4>
        <div class="setting-row"><div class="setting-info"><div class="s-label">导出/导入</div></div><div style="display:flex;gap:6px"><button class="dbtn" style="font-size:11px" id="exportBtn">导出</button><button class="dbtn" style="font-size:11px" id="importBtn">导入</button><input type="file" id="impFile" accept=".json" style="display:none"></div></div>
      </div>
    </div>
    <div class="modal-foot"><button class="dbtn" id="settingsModalCancel">取消</button><button class="dbtn dbtn-primary" id="settingsModalSave">保存</button></div>
  </div>
</div>

<!-- Confirm -->
<div class="modal-bg confirm-modal" id="confirmModal">
  <div class="modal" style="max-width:360px">
    <div class="modal-head"><h3 id="cfmTitle">确认</h3><button class="modal-x" id="confirmModalClose">&#10005;</button></div>
    <div class="modal-body"><p id="cfmMsg" style="font-size:13px"></p></div>
    <div class="modal-foot"><button class="dbtn" id="confirmModalCancel">取消</button><button class="dbtn dbtn-danger" id="cfmOk">确认</button></div>
  </div>
</div>

<!-- Toast -->
<div class="toast-box" id="toastBox"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
